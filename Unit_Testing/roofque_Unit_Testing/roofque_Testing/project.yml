---
:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: :none
  :use_auxiliary_dependencies: TRUE
  :build_root: build
  :release_build: FALSE
  :test_file_prefix: test_

:paths:
  :test:
    - +:test/**
  :source:
    - src/**
  :include:
    - src/**
  :support:
    - test/support

:defines:
  # Selects which STM32 HAL family CAL.h pulls in. We define STM32G070xx
  # so it includes our test-only stm32g0xx_hal.h stub (test/support/).
  :test:
    - TEST
    - STM32G070xx

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
    - :ignore_arg
    - :array
    - :return_thru_ptr
  :treat_as:
    uint8:    HEX8
    uint16:   HEX16
    uint32:   HEX32
    int8:     INT8
    bool:     UINT8

:tools: {}

:gcov:
  :reports:
    - HtmlDetailed
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90

:plugins:
  :enabled:
    - report_tests_pretty_stdout
    - module_generator
    - gcov
...
